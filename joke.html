<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Joke Game 🔥😂🎮</title>
<link rel="stylesheet" href="jokecss.css">
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="container">
  <h2>🔐 Login / Register</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="authMsg"></p>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<h2>Welcome, <span id="userDisplay"></span> 👋</h2>
<button onclick="logout()">Logout</button>
<button onclick="toggleDark()">🌙 Mode</button>

<hr>

<select id="language">
  <option value="en">English</option>
  <option value="ne">Nepali</option>
</select>

<select id="category">
  <option value="random">Random</option>
  <option value="programming">Programming</option>
  <option value="general">General</option>
</select>

<h3>🎯 Difficulty</h3>
<select id="difficulty">
  <option value="easy">Easy (15s)</option>
  <option value="medium" selected>Medium (10s)</option>
  <option value="hard">Hard (5s)</option>
</select>

<h3>👥 Mode</h3>
<select id="mode">
  <option value="single">Single Player</option>
  <option value="multi">Multiplayer</option>
</select>

<p>❤️ Lives: <span id="lives">3</span></p>
<p>👤 Player: <span id="player">Player 1</span></p>
<p>⏱ Time: <span id="timer">10</span></p>

<p id="joke">Click Get Joke</p>

<button onclick="getJoke()">Get Joke</button>
<button onclick="speakJoke()">🔊 Speak</button>

<hr>

<input id="guess" placeholder="Your guess">
<button onclick="checkGuess()">Submit</button>

<p id="result"></p>
<p>Score: <span id="score">0</span></p>

<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>

</div>

<script src="jokescript.js"></script>
</body>
</html>
